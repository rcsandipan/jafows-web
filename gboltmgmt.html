<body>


<div class="main-content">
    <button class="btn btn-success" id="home-btn"> HOME</button>
    <h1 style="display:flex; text-align: center; margin-left: 40%;"> GB OLT</h1>
<div>Total Count: <b id="searchcount"></b> </div>
<div style="display: inline-flex; justify-content: space-evenly;" >
    
    <div  style="margin-right: 700px; width: 400px;" >

<div>

</button>

 </div>

    <table class="table table-bordered" id="onudata-table" style="margin-top: 20px;">
      <thead>
        <tr>
        
          <th>PON</th>
          <th>ONU</th>
          <th>FTTH No/IP Address</th>
          <th>MAC</th>
          <th>Customer</th>
          <th>Address</th>
          <th>Current Status</th>
          <th>Last Synced</th>
          <th>Rx Power(dBm)</th>
          <th>Last Event</th>
          <th>Event Time</th>

        </tr>
      </thead>
      <tbody id="onudata-body">
        <!-- Filled by JS -->
      </tbody>
    </table>

</div>
   
    


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
    <script src="https://cdn.rawgit.com/rainabba/jquery-table2excel/1.1.0/dist/jquery.table2excel.min.js"></script>
    <script src="script.js"></script>
    <script type="module" src="auth-check.js"></script>
    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
//import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
 import { app} from "./firebase-config.js";  

//const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
//const auth = getAuth(app);
//const firestore = getFirestore(app);

//   const currentuser = localStorage.getItem("currentuser");
//   const userRole = localStorage.getItem("userpriv");
//   const userData = userDoc.data();
//   const userRole = userData.role || 'user';
//   const userSection = userData.section || '';
//   var userSection = localStorage.getItem("userSection");
//   console.log(userSection);
//   console.log(userRole);


let onulevel = -26;
const dataRef = ref(db, 'gboltdata');

let allONUs = {};

onValue(dataRef, (snapshot) => {
    allONUs = snapshot.val() || {};
 
    renderTable();
});




/* ============================= */
/* ===== RENDER TABLE ========= */
/* ============================= */
function renderTable() {

    const tbody = document.getElementById("onudata-body");
   
    const searchText = document.getElementById("searchInput").value.toLowerCase();
    let searchcount = document.getElementById('searchcount');

    tbody.innerHTML = "";

    let filteredData = [];

    for (let key in allONUs) {

        const onudata = allONUs[key];

        
        /* SEARCH FILTER */
        const rowText = Object.values(onudata).join(" ").toLowerCase();
        if (!rowText.includes(searchText)) continue;

           

        filteredData.push(onudata);
    }



    

    /* ============================= */
    /* ===== CREATE ROWS ========== */
    /* ============================= */
    filteredData.forEach(onudata => {

     

        const row = document.createElement("tr");

        row.innerHTML = `
            
            <td>${onudata.pon_no || ''}</td>
            <td>${onudata.onu_id || ''}</td>
            <td>${onudata.ftthno || ''}</td>
            <td>${onudata.macaddress || ''}</td>
            <td>${onudata.customer || ''}</td>
            <td>${onudata.address || ''}</td>
            <td>${onudata.currentstatus || ''}</td>
            <td>${onudata.synctime || ''}</td>

            <td style="color:${rxColor}; font-weight:bold;">
                ${onudata.rxpower || ''}
            </td>

            <td style="color:${onuColor}; font-weight:bold;">
                ${onuStatus}
            </td>

            <td>${onudata.eventtime || ''}</td>
        `;

        tbody.appendChild(row);
    });
    searchcount.innerText = filteredData.length;
}

/* ============================= */
/* ===== SEARCH + FILTER ===== */
/* ============================= */
document.getElementById("searchInput").addEventListener("keyup", function(){
    renderTable();
    
});


/* ============================= */
/* ===== EXPORT TO EXCEL ===== */
/* ============================= */
document.getElementById("exportBtn").addEventListener("click", function () {

    $("#onudata-table").table2excel({
        exclude: ".noExl",
        name: "GB OLT Report",
        filename: "GBOLT_Report",
        fileext: ".xls"
    });

});

    </script>
</body>
</html>
