<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- <script src="https://www.gstatic.com/firebasejs/9.8.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.8.4/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.8.4/firebase-auth-compat.js"></script> -->

  </head>

  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.sitename{
   text-align: center; 
   margin-top: 30px;
}
body {
    background-color: #bcbdc1;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
   
}

.form {
    margin-left: auto;
    margin-right: auto;
    margin-top: 50px ;
    justify-content: center;
    align-items: center;
    width: 400px;
    height: 350px;
    border-radius: 5px;
    background-color: #0161b0;
    /* height:fit-content;  */
    padding: 5px 10px;
}
.form1 {
    margin-left: auto;
    margin-right: auto;
    margin-top: 200px ;
    justify-content: center;
    align-items: center;
    width: 400px;
    height: 260px;
    border-radius: 5px;
    background-color: #0161b0;
    /* height:fit-content;  */
    padding: 5px 10px;
}
label {
    display: block;
    font-weight: bolder;
    margin: 5px 0px;
}

input {
    width: 100%;
    padding: 8px 5px;
    border-radius: 5px;
    margin-bottom: 10px;
}

#submit-btn {
    border: none;
    background-color: coral;
    width: 100%;
    padding: 10px 8px;
    color: white;
    font-weight: bolder;
    text-transform: uppercase;
    cursor: pointer;
    margin: 9px 0px;
}
#submit-btn:hover {
    background-color: #CF524E;
}
#change-btn {
    border: none;
    background-color: coral;
    width: 100%;
    padding: 10px 8px;
    color: white;
    font-weight: bolder;
    text-transform: uppercase;
    cursor: pointer;
    margin: 9px 0px;
}
#change-btn:hover {
    background-color: #CF524E;
}

p {
    font-size: 12px;
    border-radius: 10px;
    cursor: pointer;
    display: inline-block;
}

a {
    text-decoration: none;
    font-weight: bolder;
}

  </style>
  <body>
    <div class="form1">
     
      <div class="pass">
        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="password"
        />
      </div>
      <div class="pass">
        <label for="password">Confirm Password</label>
        <input
          type="password"
          name="password"
          id="confirm_password"
          placeholder="confirm password"
        />
      </div>
     
     

      <!-- Sign Up button -->
      <button id="change-btn">CHANGE PASSWORD
        <!-- <span id="spinner" class="spinner-border spinner-border-sm d-none" role="status"></span> -->
      </button> 
    
    </div>

    <script type="module">
      import { app} from "./firebase-config.js";  
     
        import { getAuth, sendPasswordResetEmail,updatePassword } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
  
       
        const auth = getAuth();




   
    var changebtn = document.getElementById('change-btn');
 

    changebtn.addEventListener('click', changePassword);


function changePassword (){
    const newPassword = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;
       // Check if passwords match
       if (newPassword !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    // Check if user is logged in
    const user = auth.currentUser;
    if (!user) {
        alert("No user is signed in.");
        return;
    }

    // Update password in Firebase
    
        updatePassword(user, newPassword);
        alert("Password updated successfully!");
        window.location.href = "lccarehome.html";
   



       
}
    </script>
  </body>
</html>
